<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サーモンラン分析</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>サーモンラン分析</h1>
  </header>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('input')">入力</button>
    <button class="tab" onclick="switchTab('list')">履歴</button>
    <button class="tab" onclick="switchTab('analysis')">分析</button>
  </div>

  <!-- 入力 -->
  <section id="input" class="panel active">
    <input id="resultInput" placeholder="成功 / 失敗 / オカシラ成功 / オカシラ失敗">
    <input id="specialInput" placeholder="スペシャル名（例：ナイスダマ）">
    <button onclick="addBattle()">追加</button>
  </section>

  <!-- 履歴 -->
  <section id="list" class="panel">
    <ul id="battleList"></ul>
  </section>

  <!-- 分析 -->
  <section id="analysis" class="panel">
    <div id="stats"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
